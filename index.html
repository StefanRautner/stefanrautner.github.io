<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stefan Rautner – Portfolio</title>
  <meta name="description" content="Stefan Rautner – Developer of smart home systems, security tools, and automation software.">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Cursor glow -->
<div class="cursor-glow" aria-hidden="true"></div>

<!-- Animated particle canvas -->
<canvas id="bgCanvas" aria-hidden="true"></canvas>

<!-- ─── HEADER ─────────────────────────────────────────────────────────── -->
<header id="header">
  <a href="#hero" class="wordmark">stefan_rautner</a>

  <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>

  <div class="menu-right" id="menuRight">
    <nav class="nav-links" aria-label="Main navigation">
      <a href="#hero"         data-key="nav_home"></a>
      <a href="#about"        data-key="nav_about"></a>
      <a href="#projects"     data-key="nav_projects"></a>
      <a href="#certificates" data-key="nav_certificates"></a>
      <a href="#school-work"  data-key="nav_school_work"></a>
      <a href="#voluntary"    data-key="nav_voluntary"></a>
      <a href="#skills"       data-key="nav_skills"></a>
      <a href="#contact"      data-key="nav_contact"></a>
    </nav>

    <div class="header-controls">
      <button class="icon-btn" id="themeToggle" aria-label="Toggle light/dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <button class="lang-btn" id="langToggle" aria-label="Switch language">DE</button>
    </div>
  </div>
</header>

<!-- ─── HERO ──────────────────────────────────────────────────────────── -->
<section id="hero" class="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow mono"></p>
    <h1 class="hero-title"></h1>
    <p class="hero-quote mono" data-key="hero_text"></p>
    <div class="hero-actions">
      <a href="#projects" class="btn"></a>
      <a href="#contact"  class="btn btn--ghost"></a>
    </div>
    <div class="hero-stats" id="heroStats"></div>
  </div>
</section>

<!-- ─── ABOUT ─────────────────────────────────────────────────────────── -->
<section id="about">
  <div class="section-inner">
    <h2 class="section-title" data-key="nav_about"></h2>
    <p class="about-text" data-key="about_text"></p>
    <div class="about-badges" id="aboutBadges"></div>
  </div>
</section>

<!-- ─── PROJECTS ──────────────────────────────────────────────────────── -->
<section id="projects">
  <div class="section-inner">
    <h2 class="section-title" data-key="nav_projects"></h2>
    <div class="projects-grid" id="projectsGrid"></div>
  </div>
</section>

<!-- ─── CERTIFICATES ──────────────────────────────────────────────────── -->
<section id="certificates">
  <div class="section-inner">
    <h2 class="section-title" data-key="nav_certificates"></h2>
    <div class="cards-grid" id="certificatesGrid"></div>
  </div>
</section>

<!-- ─── SCHOOL / WORK ─────────────────────────────────────────────────── -->
<section id="school-work">
  <div class="section-inner">
    <h2 class="section-title" data-key="nav_school_work"></h2>
    <div class="timeline" id="schoolWorkTimeline"></div>
  </div>
</section>

<!-- ─── VOLUNTARY ─────────────────────────────────────────────────────── -->
<section id="voluntary">
  <div class="section-inner">
    <h2 class="section-title" data-key="nav_voluntary"></h2>
    <div class="cards-grid cards-grid--wide" id="voluntaryGrid"></div>
  </div>
</section>

<!-- ─── SKILLS ────────────────────────────────────────────────────────── -->
<section id="skills">
  <div class="section-inner">
    <h2 class="section-title" data-key="nav_skills"></h2>
    <div class="skills-layout">

      <div class="skills-col">
        <div class="skills-block">
          <h3 class="skills-block-title" data-key="nav_programming"></h3>
          <div class="skill-bars" id="programmingBars"></div>
        </div>
        <div class="skills-block">
          <h3 class="skills-block-title" data-key="nav_databases"></h3>
          <div class="skill-bars" id="databasesBars"></div>
        </div>
      </div>

      <div class="skills-col">
        <div class="skills-block">
          <h3 class="skills-block-title" data-key="nav_frameworks"></h3>
          <div class="skill-chips" id="frameworksChips"></div>
        </div>
        <div class="skills-block">
          <h3 class="skills-block-title" data-key="nav_languages"></h3>
          <div class="skill-chips" id="languagesChips"></div>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- ─── GITHUB STATS ──────────────────────────────────────────────────── -->
<section id="github-stats">
  <div class="section-inner">
    <h2 class="section-title" data-key="nav_github_stats"></h2>
    <div class="github-grid">
      <div class="github-card github-card--wide reveal reveal-delay-1">
        <img loading="lazy"
          src="https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=StefanRautner&theme=react"
          alt="GitHub Profile Details">
      </div>
      <div class="github-card github-card--streak reveal reveal-delay-2">
        <img loading="lazy"
          src="https://streak-stats.demolab.com?user=StefanRautner&theme=react"
          alt="GitHub Streak">
      </div>
      <div class="github-card reveal reveal-delay-3">
        <img loading="lazy"
          src="https://github-readme-stats.vercel.app/api/top-langs/?username=StefanRautner&layout=compact&theme=react"
          alt="Top Languages">
      </div>
    </div>
  </div>
</section>

<!-- ─── CONTACT ───────────────────────────────────────────────────────── -->
<section id="contact">
  <div class="section-inner contact-inner">
    <h2 class="section-title" data-key="contact_title"></h2>
    <p data-key="contact_text"></p>
    <div class="contact-links">
      <a id="emailBtn" class="btn" href="mailto:stefan.rautner06@gmail.com"></a>
      <a id="githubBtn" class="btn btn--ghost" href="https://github.com/StefanRautner" target="_blank" rel="noopener"></a>
      <a id="linkedinBtn" class="btn btn--ghost" href="https://www.linkedin.com/in/stefanrautner" target="_blank" rel="noopener"></a>
      <a id="credlyBtn" class="btn btn--ghost" href="https://www.credly.com/users/stefanrautner" target="_blank" rel="noopener"></a>
    </div>
  </div>
</section>

<!-- ─── FOOTER ────────────────────────────────────────────────────────── -->
<footer>
  <span data-key="footer_text"></span>
</footer>

<button id="scrollTopBtn" class="scroll-top" aria-label="Scroll to top">↑</button>

<script src="script.js"></script>
</body>
</html>
